name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore RateOple.sln

      - name: Build
        run: dotnet build RateOple.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RateOple.sln --configuration Release --no-build

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

  integrated-publish:
    name: Integrated frontend and backend publish
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
      - playwright-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend into backend wwwroot
        working-directory: frontend
        run: npm run build:backend

      - name: Restore backend
        working-directory: backend
        run: dotnet restore RateOple.sln

      - name: Publish backend
        working-directory: backend
        run: dotnet publish RateOple/RateOple.csproj --configuration Release --no-restore --output ../artifacts/rateople

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: rateople-publish
          path: artifacts/rateople/
          retention-days: 7